<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Очередь специалиста - Dmed.Стационар</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="nav-root"></div>

<div class="dmed-container">
  <div class="dmed-breadcrumb">
    <a href="index.html">Главная</a>
    <span class="separator">›</span>
    <span>Кабинет специалиста</span>
  </div>

  <div class="specialist-toolbar">
    <div>
      <h2 style="margin:0 0 4px 0;">Очередь пациентов на сегодня</h2>
      <div class="text-muted" id="specialist-subtitle"></div>
    </div>
  </div>

  <div class="kpi-row" id="kpi-row"></div>

  <div id="queue-root"></div>
</div>

<script src="storage.js"></script>
<script src="data.js"></script>
<script src="specialist-common.js"></script>
<script>
  const specialist = window.DmedSpecialist.getSpecialistFromUrl();
  document.getElementById('nav-root').innerHTML = window.DmedSpecialist.buildSpecialistNav('queue', specialist.id);
  document.getElementById('specialist-subtitle').textContent = `${specialist.name} · ${specialist.role} · ${specialist.office}`;
  document.title = `Очередь специалиста - ${specialist.role}`;

  const queue = window.DmedSpecialist.getQueueForSpecialist(specialist.id);
  const allAssignments = window.DmedSpecialist.getAssignmentsForSpecialist(specialist.id, 'today');
  const completed = allAssignments.filter(i => i.status === 'done').length;

  const kpiData = [
    { label: 'Пациентов на сегодня', value: queue.length },
    { label: 'Процедур в очереди', value: allAssignments.length },
    { label: 'Выполнено', value: completed },
    { label: 'Осталось', value: Math.max(0, allAssignments.length - completed) }
  ];

  const kpiRow = document.getElementById('kpi-row');
  kpiData.forEach(item => {
    const div = document.createElement('div');
    div.className = 'kpi-card';
    div.innerHTML = `<div class="kpi-label">${item.label}</div><div class="kpi-value">${item.value}</div>`;
    kpiRow.appendChild(div);
  });

  const root = document.getElementById('queue-root');
  if (!queue.length) {
    root.innerHTML = `<div class="empty-state">На сегодня для ${specialist.role.toLowerCase()} назначений не найдено.</div>`;
  } else {
    const grid = document.createElement('div');
    grid.className = 'queue-grid';

    queue.forEach(entry => {
      const p = entry.patient;
      const procedureList = entry.procedures.map(item => {
        const badge = item.status === 'done'
          ? '<span class="badge badge-success">Выполнено</span>'
          : '<span class="badge badge-warning">Ожидает</span>';
        return `
          <div class="queue-section">
            <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;">
              <div>
                <div style="font-weight:700;">${item.procedure.name}</div>
                <div class="queue-meta">${item.procedure.slot} · ${item.procedure.room} · ${window.DmedSpecialist.formatDayLabel(p, item.dayIdx)}</div>
              </div>
              <div>${badge}</div>
            </div>
          </div>
        `;
      }).join('');

      const actionHref = specialist.id === 'psychologist'
        ? `psychologist-sheet.html?specialist=${specialist.id}&id=${p.id}`
        : `specialist-note.html?specialist=${specialist.id}&id=${p.id}&code=${entry.procedures[0].code}&day=${entry.procedures[0].dayIdx}`;

      const actionLabel = specialist.id === 'psychologist' ? 'Открыть лист психолога' : 'Открыть карточку процедуры';

      const card = document.createElement('div');
      card.className = 'queue-card';
      card.innerHTML = `
        <div class="queue-head">
          <div>
            <div class="queue-title">${p.fullName}</div>
            <div class="queue-meta">Карта № ${p.id} · ${p.age} лет · ${p.ward}</div>
            <div class="queue-meta" style="margin-top:4px;">${p.admissionDiagnosisClarify || p.admissionDiagnosisMain}</div>
          </div>
          <div>${entry.allDone ? '<span class="badge badge-success">Завершено</span>' : '<span class="badge badge-info">В работе</span>'}</div>
        </div>
        ${procedureList}
        <div class="queue-actions">
          <a class="btn btn-primary btn-sm" href="${actionHref}">${actionLabel}</a>
          <a class="btn btn-sm" href="patient.html?id=${p.id}">Карта пациента</a>
        </div>
      `;
      grid.appendChild(card);
    });

    root.appendChild(grid);
  }
</script>
</body>
</html>
